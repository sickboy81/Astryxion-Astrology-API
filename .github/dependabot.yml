# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    labels:
      - dependencies
    groups:
      npm-dependencies:
        patterns:
          - "*"
    ignore:
      # Zod 4 exige migração + zod-to-json-schema; rever manualmente.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Projeto usa Node 22; tipos major seguem a linha 22.x.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
