# Optional synthetic monitoring: set repository variable HEALTHCHECK_URL to your public /health URL.
# Example: https://api.example.com/health
# Settings → Secrets and variables → Actions → Variables → New repository variable

name: Health check (scheduled)

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::notice::HEALTHCHECK_URL is not set — skipping. Add it under Settings → Secrets and variables → Actions → Variables."
            exit 0
          fi
          curl -fsS "$URL" -H "Accept: application/json" -o /tmp/health.json
          jq -e '.status == "ok"' /tmp/health.json >/dev/null
